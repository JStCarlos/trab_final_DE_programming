# Configuração central (caminhos relativos à raiz do repositório).
# Sobrescreva com variáveis de ambiente ou use RELATORIO_PROJECT_ROOT se o CWD não for a raiz.
spark:
  app_name: "relatorio-pedidos-fiap"
  master: "local[*]"

paths:
  pedidos: "data/datasets-csv-pedidos-main/data/pedidos"
  pagamentos: "data/dataset-json-pagamentos-main/data/pagamentos"
  output: "output/relatorio_pedidos"

file_options:
  pedidos_csv:
    compression: "gzip"
    header: true
    sep: ";"

parquet:
  write_mode: "overwrite"
  compression: "snappy"
